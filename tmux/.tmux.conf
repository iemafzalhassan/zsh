# ~/.tmux.conf — Catppuccin-aware tmux config
# Compatible with macOS and Linux.

# =========================================================
# General
# =========================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides "*,*:RGB"
set -g focus-events on
set -g mouse on
set -g set-clipboard on
set -ga terminal-features ",xterm-256color:clipboard"

# Prefix from C-b to C-a (screen-style, more comfortable)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config with Prefix + r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# =========================================================
# Pane / window nav (vim-style h/j/k/l)
# =========================================================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# =========================================================
# Splits (Prefix | and -)
# =========================================================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# =========================================================
# Catppuccin Mocha status line
# =========================================================
# Colors: bg=#1e1e2e, fg=#cdd6f4, surface=#313244, accent=#cba6f7
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 80
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left "#[fg=#cba6f7,bold] #S #[fg=#1e1e2e]│"
set -g status-right "#[fg=#a6adc8]#{?client_prefix,#[fg=#f38ba8] WAIT ,}#[fg=#a6adc8] %Y-%m-%d %H:%M "

# Active window — purple, bold
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7,bold] #I:#W "
# Inactive window
setw -g window-status-format "#[fg=#a6adc8] #I:#W "
# Last window
setw -g window-status-last-format "#[fg=#a6adc8] #I:#W "

# Pane borders — Catppuccin Surface
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

# Message / command line
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#f5c2e7"
set -g mode-style "bg=#313244,fg=#f5e0dc"

# =========================================================
# TPM (Tmux Plugin Manager) — auto-installed by install.sh
# =========================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux'

# Catppuccin theme options
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_status_modules "session directory user host git"
set -g @catppuccin_status_style "rounded"

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
