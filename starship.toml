# Starship config — Catppuccin Mocha palette
# https://starship.rs/config/

"$schema" = 'https://starship.rs/config-schema.json'

# Newline before the prompt for breathing room
add_newline = true

# Pad the prompt one line above to balance
[line_break]
disabled = true

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$rust\
$golang\
$python\
$docker_context\
$time\
$fill\
$character"""

[fill]
symbol = ' '

# =========================================================
# Per-tool modules
# =========================================================

[username]
show_always = false
format = "[ $user ]($style) "
style_user = "blue bold"
style_root = "red bold"

[hostname]
format = "[ $hostname]($style) "
ssh_only = true
disabled = false

[directory]
format = "[ $path ]($style) "
style = "cyan bold"
truncation_length = 3
truncation_symbol = "…/"
repo_root_style = "cyan bold"
repo_root_format = "[ $before_root_path ]($repo_root_style)$repo_root"

[git_branch]
format = "[ $symbol $branch ]($style) "
symbol = ""
style = "purple bold"

[git_status]
format = "([$all_status$ahead_behind ]($style))"
style = "red bold"
modified = "[!$count](yellow)"
staged = '[+\($count\)](green)'
untracked = "[?$count](orange)"
deleted = "[✘$count](red)"
ahead = "[⇡$count](cyan)"
behind = "[⇣$count](cyan)"
diverged = "[⇡$ahead_count⇣$behind_count](red)"

[nodejs]
format = "[ $symbol ($version) ]($style) "
symbol = ""
style = "green bold"

[rust]
format = "[ $symbol ($version) ]($style) "
symbol = ""
style = "red bold"

[golang]
format = "[ $symbol ($version) ]($style) "
symbol = ""
style = "cyan bold"

[python]
format = "[ $symbol ($version) ]($style) "
symbol = ""
style = "yellow bold"

[docker_context]
format = "[ $symbol $context ]($style) "
symbol = ""
style = "blue bold"

[time]
format = "[ $time ]($style) "
disabled = true
style = "bright-black"

[character]
success_symbol = "[❯](green bold)"
error_symbol = "[❯](red bold)"
vimcmd_symbol = "[❮](blue bold)"

# =========================================================
# Command duration (only when command takes >2s)
# =========================================================

[cmd_duration]
format = "[$duration]($style) "
style = "yellow bold"
min_time = 2_000
show_milliseconds = false
